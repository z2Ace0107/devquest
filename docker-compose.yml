# DevQuest Log — Docker Compose 部署
# 启动: docker compose up -d

services:
  backend:
    build: .
    image: devquest-log:latest
    container_name: devquest-backend
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v3}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
    volumes:
      - ./data:/app/data
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build: .
    image: devquest-log:latest
    container_name: devquest-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    restart: unless-stopped
